<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秒杀系统 - 用户端</title>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ===== 登录页面 ===== */
        .login-container {
            background: white;
            padding: 48px 40px;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12);
            width: 420px;
            display: none;
        }

        .login-container.active {
            display: block;
        }

        .login-container h1 {
            text-align: center;
            font-size: 28px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .login-container .subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* ===== Tab 切换 ===== */
        .tab-wrapper {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 2px solid #e8e8e8;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 0;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .tab-btn.active {
            color: #ff6b6b;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: #ff6b6b;
            border-radius: 2px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .login-container label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .login-container input,
        .login-container select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            margin-bottom: 16px;
        }

        .login-container input:focus {
            outline: none;
            border-color: #ff6b6b;
        }

        .login-container select {
            appearance: none;
            background: white;
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 8px;
        }

        .login-btn:hover {
            background: #e55a5a;
        }

        .login-error {
            color: #ff6b6b;
            font-size: 14px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        .login-success {
            color: #00b894;
            font-size: 14px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }

        .login-hint {
            font-size: 13px;
            color: #999;
            text-align: center;
            margin-top: 12px;
        }

        /* ===== 主界面（与之前相同） ===== */
        .main-container {
            width: 1200px;
            max-width: 98%;
            display: none;
            padding: 20px 0;
        }

        .main-container.active {
            display: block;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            margin-bottom: 24px;
        }

        .header .logo {
            font-size: 22px;
            font-weight: 700;
            color: #ff6b6b;
        }

        .header .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header .user-info span {
            color: #333;
            font-weight: 500;
        }

        .header .logout-btn {
            padding: 8px 20px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .header .logout-btn:hover {
            background: #e55a5a;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        .product-card .image {
            height: 180px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
        }

        .product-card .image.green {
            background: linear-gradient(135deg, #00b894, #00a381);
        }

        .product-card .image.blue {
            background: linear-gradient(135deg, #0984e3, #0652DD);
        }

        .product-card .info {
            padding: 16px 20px;
        }

        .product-card .name {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .product-card .desc {
            font-size: 13px;
            color: #888;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-card .price-stock {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .product-card .price {
            font-size: 24px;
            font-weight: 700;
            color: #ff6b6b;
        }

        .product-card .price .symbol {
            font-size: 16px;
        }

        .product-card .stock {
            font-size: 14px;
            color: #888;
        }

        .product-card .stock .num {
            color: #333;
            font-weight: 600;
        }

        .product-card .buy-btn {
            width: 100%;
            padding: 10px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .product-card .buy-btn:hover:not(:disabled) {
            background: #e55a5a;
        }

        .product-card .buy-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .order-section {
            background: white;
            border-radius: 12px;
            padding: 20px 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .order-section .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .order-section .filter-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .order-section .filter-btns button {
            padding: 4px 14px;
            border: 2px solid #e8e8e8;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .order-section .filter-btns button.active {
            border-color: #ff6b6b;
            background: #ff6b6b;
            color: white;
        }

        .order-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            flex-wrap: wrap;
            gap: 8px;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-item .order-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .order-item .order-no {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }

        .order-item .order-time {
            font-size: 12px;
            color: #aaa;
        }

        .order-item .order-status {
            font-size: 14px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .order-item .order-status.pending {
            color: #f39c12;
            background: #fef9e7;
        }

        .order-item .order-status.paid {
            color: #00b894;
            background: #e8f8f5;
        }

        .order-item .order-status.cancelled {
            color: #e74c3c;
            background: #fdedec;
        }

        .order-item .order-status.timeout {
            color: #95a5a6;
            background: #f0f0f0;
        }

        .order-item .order-total {
            font-size: 16px;
            font-weight: 600;
            color: #ff6b6b;
        }

        .order-empty {
            text-align: center;
            color: #aaa;
            padding: 30px 0;
            font-size: 14px;
        }

        .pay-btn {
            padding: 4px 12px;
            background: #00b894;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin: 0 8px;
        }

        .pay-btn:hover {
            background: #00a381;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            font-size: 15px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
            z-index: 9999;
            display: none;
            animation: slideDown 0.4s ease;
        }

        .toast.success {
            background: #00b894;
        }

        .toast.error {
            background: #ff6b6b;
        }

        .toast.warning {
            background: #f39c12;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @media (max-width: 768px) {
            .product-grid {
                grid-template-columns: 1fr 1fr;
            }
            .login-container {
                width: 90%;
                padding: 32px 20px;
            }
            .header {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }
            .order-item {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 500px) {
            .product-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<!-- ===== Toast ===== -->
<div id="toast" class="toast"></div>

<!-- ===== 登录页面 ===== -->
<div id="loginContainer" class="login-container active">
    <h1>⚡ 秒杀系统</h1>
    <p class="subtitle">登录后参与抢购</p>

    <!-- Tab 切换 -->
    <div class="tab-wrapper">
        <button class="tab-btn active" data-tab="login" onclick="switchTab('login')">登录</button>
        <button class="tab-btn" data-tab="register" onclick="switchTab('register')">注册</button>
    </div>

    <!-- ===== 登录 Tab ===== -->
    <div id="loginTab" class="tab-content active">
        <label>用户名</label>
        <input id="loginUsername" type="text" placeholder="请输入用户名">

        <label>密码</label>
        <input id="loginPassword" type="password" placeholder="请输入密码">

        <button class="login-btn" onclick="handleLogin()">登 录</button>
        <p id="loginError" class="login-error">❌ 用户名或密码错误</p>
    </div>

    <!-- ===== 注册 Tab ===== -->
    <div id="registerTab" class="tab-content">
        <label>用户名</label>
        <input id="regUsername" type="text" placeholder="请设置用户名（4-20位字母或数字）">

        <label>密码</label>
        <input id="regPassword" type="password" placeholder="请设置密码（6位以上）">

        <label>手机号</label>
        <input id="regPhone" type="text" placeholder="请输入手机号（选填）">

        <button class="login-btn" onclick="handleRegister()">注 册</button>
        <p id="registerSuccess" class="login-success">✅ 注册成功，请切换到登录页面</p>
        <p id="registerError" class="login-error"></p>
    </div>
</div>

<!-- ===== 主界面 ===== -->
<div id="mainContainer" class="main-container">
    <!-- 顶部导航 -->
    <div class="header">
        <div class="logo">⚡ 秒杀系统</div>
        <div class="user-info">
            <span>👋 欢迎，<strong id="currentUser">用户</strong></span>
            <button class="logout-btn" onclick="handleLogout()">退出登录</button>
        </div>
    </div>

    <!-- 商品列表 -->
    <div id="productGrid" class="product-grid"></div>

    <!-- 订单列表 -->
    <div class="order-section">
        <div class="section-title">
            <span>📋 我的订单</span>
            <div class="filter-btns">
                <button class="active" data-status="" onclick="loadOrders('')">全部</button>
                <button data-status="0" onclick="loadOrders('0')">待支付</button>
                <button data-status="1" onclick="loadOrders('1')">已支付</button>
                <button data-status="2" onclick="loadOrders('2')">已取消</button>
            </div>
        </div>
        <div id="orderList" class="order-list">
            <div class="order-empty">暂无订单，快去抢购吧！</div>
        </div>
    </div>
</div>

<script>
    const API_BASE = '/api';
    let currentUserId = null;
    let currentUsername = null;
    let stockTimer = null;

    // ===== Tab 切换 =====
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.tab === tab);
        });
        document.getElementById('loginTab').classList.toggle('active', tab === 'login');
        document.getElementById('registerTab').classList.toggle('active', tab === 'register');
        // 隐藏错误/成功消息
        document.getElementById('loginError').style.display = 'none';
        document.getElementById('registerError').style.display = 'none';
        document.getElementById('registerSuccess').style.display = 'none';
    }

    // ===== Toast =====
    function showToast(message, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = 'toast ' + type;
        toast.style.display = 'block';
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }

    // ===== 用户注册 =====
    async function handleRegister() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        const phone = document.getElementById('regPhone').value.trim();

        if (!username || username.length < 4) {
            document.getElementById('registerError').textContent = '❌ 用户名至少4位';
            document.getElementById('registerError').style.display = 'block';
            return;
        }
        if (!password || password.length < 6) {
            document.getElementById('registerError').textContent = '❌ 密码至少6位';
            document.getElementById('registerError').style.display = 'block';
            return;
        }

        try {
            const response = await axios.post(`${API_BASE}/auth/register`, {
                username: username,
                password: password,
                phone: phone || '',
                role: 'USER'
            });

            const data = response.data;
            if (data.code === 200) {
                document.getElementById('registerSuccess').style.display = 'block';
                document.getElementById('registerError').style.display = 'none';
                // 清空表单
                document.getElementById('regUsername').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regPhone').value = '';
                showToast('✅ 注册成功，请切换到登录页面', 'success');
                // 2秒后自动切换到登录
                setTimeout(() => switchTab('login'), 1500);
            } else {
                document.getElementById('registerError').textContent = '❌ ' + data.message;
                document.getElementById('registerError').style.display = 'block';
                document.getElementById('registerSuccess').style.display = 'none';
            }
        } catch (error) {
            const msg = error.response?.data?.message || '网络异常，请稍后再试';
            document.getElementById('registerError').textContent = '❌ ' + msg;
            document.getElementById('registerError').style.display = 'block';
        }
    }

    // ===== 用户登录 =====
    async function handleLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();

        if (!username || !password) {
            showToast('请输入用户名和密码', 'error');
            return;
        }

        try {
            const response = await axios.post(`${API_BASE}/auth/login`, {
                username: username,
                password: password,
                role: 'USER'
            });

            const data = response.data;
            if (data.code === 200) {
                const loginData = data.data;
                currentUserId = loginData.userId;
                currentUsername = loginData.username;

                localStorage.setItem('userToken', loginData.token);
                localStorage.setItem('userId', currentUserId);
                localStorage.setItem('username', currentUsername);
                axios.defaults.headers.common['Authorization'] = 'Bearer ' + loginData.token;

                document.getElementById('loginError').style.display = 'none';
                document.getElementById('loginContainer').classList.remove('active');
                document.getElementById('mainContainer').classList.add('active');
                document.getElementById('currentUser').textContent = currentUsername;

                showToast('🎉 登录成功！', 'success');

                if (stockTimer) clearInterval(stockTimer);
                stockTimer = setInterval(() => loadProducts(), 5000);

                loadProducts();
                loadOrders('');
            } else {
                document.getElementById('loginError').style.display = 'block';
                showToast('❌ ' + (data.message || '登录失败'), 'error');
            }
        } catch (error) {
            const msg = error.response?.data?.message || '网络异常，请稍后再试';
            document.getElementById('loginError').style.display = 'block';
            showToast('❌ ' + msg, 'error');
        }
    }

    // ===== 退出登录 =====
    function handleLogout() {
        if (stockTimer) {
            clearInterval(stockTimer);
            stockTimer = null;
        }
        currentUserId = null;
        currentUsername = null;
        localStorage.removeItem('userToken');
        localStorage.removeItem('userId');
        localStorage.removeItem('username');
        delete axios.defaults.headers.common['Authorization'];
        document.getElementById('mainContainer').classList.remove('active');
        document.getElementById('loginContainer').classList.add('active');
        showToast('已退出登录', 'warning');
    }

    // ===== 加载商品列表 =====
    function loadProducts() {
        const container = document.getElementById('productGrid');
        const products = [
            { id: 1, name: 'iPhone 15 Pro Max', price: 8999, stock: 100, emoji: '📱' },
            { id: 2, name: 'MacBook Pro 14"', price: 16999, stock: 50, emoji: '💻' },
            { id: 3, name: 'AirPods Pro 2', price: 1899, stock: 200, emoji: '🎧' },
        ];

        container.innerHTML = '';
        products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="image ${p.id === 1 ? '' : p.id === 2 ? 'green' : 'blue'}">${p.emoji}</div>
                <div class="info">
                    <div class="name">${p.name}</div>
                    <div class="desc">${p.id === 1 ? 'A17 Pro芯片·钛金属边框' : p.id === 2 ? 'M3 Pro芯片·18小时续航' : '主动降噪·H2芯片'}</div>
                    <div class="price-stock">
                        <span class="price"><span class="symbol">¥</span>${p.price.toFixed(2)}</span>
                        <span class="stock">库存 <span class="num" id="stock-${p.id}">${p.stock}</span></span>
                    </div>
                    <button class="buy-btn" id="buy-${p.id}" onclick="handleBuy(${p.id})">⚡ 立即抢购</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // ===== 购买 =====
    async function handleBuy(productId) {
        if (!currentUserId) {
            showToast('请先登录', 'error');
            return;
        }
        const btn = document.getElementById('buy-' + productId);
        btn.disabled = true;
        btn.textContent = '⏳ 抢购中...';

        try {
            const token = localStorage.getItem('userToken');
            const response = await axios.post(`${API_BASE}/order/create`, null, {
                params: { userId: currentUserId, productId: productId, quantity: 1 },
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = response.data;
            if (data.code === 200) {
                showToast(data.data || '🎉 抢购成功！', 'success');
                await loadOrders('');
            } else {
                showToast(data.message || '抢购失败', 'error');
            }
        } catch (error) {
            showToast('❌ ' + (error.response?.data?.message || '网络异常'), 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = '⚡ 立即抢购';
        }
    }

    // ===== 支付 =====
    async function handlePay(orderNo) {
        if (!confirm('确认支付订单：' + orderNo + ' 吗？')) return;
        try {
            const token = localStorage.getItem('userToken');
            const response = await axios.post(`${API_BASE}/order/pay`, null, {
                params: { orderNo: orderNo },
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = response.data;
            if (data.code === 200) {
                showToast('✅ ' + (data.data || '支付成功！'), 'success');
                await loadOrders('');
            } else {
                showToast('❌ ' + (data.message || '支付失败'), 'error');
            }
        } catch (error) {
            showToast('❌ ' + (error.response?.data?.message || '网络异常'), 'error');
        }
    }

    // ===== 加载订单 =====
    async function loadOrders(status) {
        if (!currentUserId) return;
        document.querySelectorAll('.filter-btns button').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.status === String(status));
        });

        try {
            const token = localStorage.getItem('userToken');
            const response = await axios.get(`${API_BASE}/order/list`, {
                params: { userId: currentUserId, status: status || undefined, page: 1, pageSize: 20 },
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const container = document.getElementById('orderList');
            const data = response.data;
            if (data.code === 200 && data.data) {
                const orders = data.data.list || [];
                if (orders.length === 0) {
                    container.innerHTML = '<div class="order-empty">📭 暂无订单</div>';
                    return;
                }
                const statusMap = {
                    0: { text: '待支付', cls: 'pending' },
                    1: { text: '已支付', cls: 'paid' },
                    2: { text: '已取消', cls: 'cancelled' },
                    3: { text: '超时取消', cls: 'timeout' }
                };
                container.innerHTML = orders.map(order => {
                    const s = statusMap[order.status] || { text: '未知', cls: '' };
                    const payButton = order.status === 0
                        ? `<button class="pay-btn" onclick="handlePay('${order.orderNo}')">💳 支付</button>`
                        : '';
                    return `
                        <div class="order-item">
                            <div class="order-info">
                                <span class="order-no">📦 ${order.orderNo}</span>
                                <span class="order-time">${order.createTime || ''}</span>
                            </div>
                            <div>
                                <span class="order-status ${s.cls}">${s.text}</span>
                                ${payButton}
                                <span class="order-total">¥${order.totalPrice || 0}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                container.innerHTML = '<div class="order-empty">📭 暂无订单</div>';
            }
        } catch (error) {
            console.error('加载订单失败', error);
            document.getElementById('orderList').innerHTML = '<div class="order-empty">⚠️ 加载失败</div>';
        }
    }

    // ===== 回车登录 =====
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && document.getElementById('loginContainer').classList.contains('active')) {
            if (document.getElementById('loginTab').classList.contains('active')) {
                handleLogin();
            } else {
                handleRegister();
            }
        }
    });

    console.log('⚡ 秒杀系统已加载');
</script>
</body>
</html>
